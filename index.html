<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP-117 | PBI Customer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .project-id {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .course-info {
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .team {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .member {
      text-align: center;
    }

    .bio-pic {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 3px solid rgba(196, 181, 253, 0.5);
      margin-bottom: 10px;
      object-fit: cover;
    }

    .member-name {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .member-role {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-3px);
      border-color: #c4b5fd;
    }

    .link-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .link-label {
      font-weight: 600;
      font-size: 1rem;
    }

    .link-sub {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      .links { grid-template-columns: 1fr; }
      h1 { font-size: 1.8rem; }
      .team { gap: 30px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="project-id">SP-117</div>
      <h1>PBI Customer</h1>
      <p class="course-info">Section 01 &middot; Spring 2026</p>
    </div>

    <div class="team">
      <div class="member">
        <img src="john.jpg" alt="John Roehsler" class="bio-pic"
             onerror="this.style.background='rgba(255,255,255,0.1)';this.src='';">
        <div class="member-name">John Roehsler</div>
        <div class="member-role">Project Manager / Data Engineer</div>
      </div>
      <div class="member">
        <img src="michael.jpg" alt="Michael Orusa" class="bio-pic"
             onerror="this.style.background='rgba(255,255,255,0.1)';this.src='';">
        <div class="member-name">Michael Orusa</div>
        <div class="member-role">Product Manager / Power BI Developer</div>
      </div>
    </div>

    <div class="links">
      <a href="SP-117-PBICustomer-FinalReport.pdf" class="link-card" target="_blank">
        <div class="link-icon">📄</div>
        <div class="link-label">Final Report</div>
        <div class="link-sub">PDF</div>
      </a>
      <a href="https://github.com/PowerBISeniorProject/SP-117-PBI-Customer" class="link-card" target="_blank">
        <div class="link-icon">💻</div>
        <div class="link-label">GitHub</div>
        <div class="link-sub">Source Code</div>
      </a>
      <a href="https://youtube.com" class="link-card" target="_blank">
        <div class="link-icon">🎥</div>
        <div class="link-label">Presentation</div>
        <div class="link-sub">Video Demo</div>
      </a>
    </div>

  </div>
</body>
</html>
